# Tema terminal oscuro estilo Fintelligentia para el dashboard de granos.
# Paleta alineada con BLOOMBERG_PALETTE en config.py.

[theme]
base = "dark"
primaryColor     = "#e06010"   # naranja terminal (acento, sliders, botones)
backgroundColor  = "#08080f"   # fondo principal (casi negro, tinte azul)
secondaryBackgroundColor = "#0e0e1a"   # sidebar, cards, widgets
textColor        = "#c8c8d4"   # texto principal

# Fuente monoespaciada — look terminal de trading.
font = "monospace"

[server]
headless = true

[browser]
gatherUsageStats = false
