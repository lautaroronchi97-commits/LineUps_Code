# Tema dark Bloomberg para el dashboard.
# Colores alineados con BLOOMBERG_PALETTE en config.py.

[theme]
base = "dark"
primaryColor = "#FF9900"             # amber Bloomberg (CTA, sliders)
backgroundColor = "#0A0E1A"          # fondo principal (navy-black)
secondaryBackgroundColor = "#141B2B" # sidebar, cards, widgets
textColor = "#E1E5EE"                # gris claro sobre navy

# Fuente monoespaciada para que la grilla de numeros se parezca a una
# terminal Bloomberg. "monospace" le pide a Streamlit que use la fuente
# monoespaciada del sistema (Consolas/Menlo/Courier segun OS).
font = "monospace"

[server]
# Util para correr streamlit en background sin que pida confirmacion de email.
headless = true

[browser]
# No recolectar stats de uso.
gatherUsageStats = false
