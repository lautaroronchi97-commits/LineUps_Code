name: Probe fuentes de datos (diagnostico)

# Workflow de diagnostico TEMPORAL. Fase 4 (final): grep del catalogo
# 'produccion' (200 desde el runner) buscando compras/comercializacion/DJVE de
# granos. Es el ultimo candidato accesible antes de concluir.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Grep catalogo produccion por compras/comercializacion de granos
        run: |
          set +e
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"

          for slug in produccion agroindustria; do
            echo "############ Catalogo: $slug ############"
            curl -s -m 40 -A "$UA" \
              "https://infra.datos.gob.ar/catalog/$slug/data.json" -o "$slug.json"
            echo "  bytes: $(wc -c < $slug.json)"
            CATFILE="$slug.json" python3 - <<'PY'
          import json, os
          fn = os.environ['CATFILE']
          try:
              cat = json.load(open(fn))
          except Exception as e:
              print("  (no JSON:", e, ")"); raise SystemExit
          ds = cat.get('dataset', [])
          print("  datasets:", len(ds))
          kw = ('compra', 'comercializ', 'djve', 'declaracion jurada', 'fijacion',
                'sio', 'venta al exterior', 'exportador')
          hit = 0
          for d in ds:
              blob = (str(d.get('title','')) + ' ' + str(d.get('description',''))).lower()
              if any(k in blob for k in kw):
                  hit += 1
                  print("  >>", d.get('title'))
                  for dist in d.get('distribution', [])[:6]:
                      u = dist.get('downloadURL') or ''
                      print("       [%s] %s" % (dist.get('format'), u))
          print("  --- matches en %s: %d" % (fn, hit))
          PY
          done
