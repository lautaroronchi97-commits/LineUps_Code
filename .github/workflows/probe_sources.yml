name: Probe fuentes de datos (diagnostico)

# Workflow de diagnostico TEMPORAL. No escribe nada.
#
# Fase 1 (ya corrida): confirmamos que infra.datos.gob.ar y apis.datos.gob.ar
# responden 200 desde el runner (vs el 403/404 de datos.magyp.gob.ar).
#
# Fase 2 (este step): bajar el catalogo agroindustria del portal nacional y
# encontrar la URL exacta del dataset de compras/comercializacion de granos,
# que es lo que alimenta el componente farmer-selling de MESA.
#
# Se borra cuando tengamos la URL.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Descubrir dataset de compras en el catalogo nacional
        run: |
          set -e
          echo "### Bajando catalogo agroindustria (infra.datos.gob.ar)..."
          curl -s -m 40 \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            "https://infra.datos.gob.ar/catalog/agroindustria/data.json" -o cat.json
          echo "Bytes bajados: $(wc -c < cat.json)"

          python3 - <<'PY'
          import json
          cat = json.load(open('cat.json'))
          ds = cat.get('dataset', [])
          print("Total datasets en el catalogo:", len(ds))
          kw = ('compra', 'comercial', 'djve', 'venta declarada', 'declaracion')
          encontrados = 0
          for d in ds:
              blob = (str(d.get('title','')) + ' ' + str(d.get('description',''))).lower()
              if any(k in blob for k in kw):
                  encontrados += 1
                  print("=" * 70)
                  print("TITLE  :", d.get('title'))
                  print("IDENT  :", d.get('identifier'))
                  print("THEMES :", d.get('theme'))
                  for dist in d.get('distribution', []):
                      print("   DIST [%s] %s" % (dist.get('format'), dist.get('title')))
                      print("        URL: %s" % dist.get('downloadURL'))
          print("=" * 70)
          print("Datasets que matchean compras/comercializacion:", encontrados)
          PY
