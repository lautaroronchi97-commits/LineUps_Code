name: Daily line-up + DJVE update

# Corre todos los dias a las 13:00 UTC = 10:00 ART (sin DST en AR).
# Tambien se puede disparar manualmente desde la pestana "Actions" del repo.
#
# NOTA importante:
# - DJVE (MAGyP) historicamente se descarga sin problemas desde runners de
#   GitHub Actions: el server admite IPs de cloud.
# - ISA (line_up_mndrn) en algun momento bloqueo IPs de GitHub Actions y
#   por eso el cron estuvo desactivado. Lo reactivamos con `continue-on-error`
#   para que un eventual bloqueo de ISA NO impida la actualizacion de DJVE.
#   Si ISA bloquea sistematicamente, ver README -> "Fallback: scrapeo via
#   Supabase Edge Function en sa-east-1".
on:
  schedule:
    - cron: '0 13 * * *'   # 13:00 UTC = 10:00 ART todos los dias
  workflow_dispatch:

# Permisos minimos del GITHUB_TOKEN: el workflow solo lee el repo y sube
# logs como artifact (no escribe codigo, no hace releases, no toca PRs).
# Reduce el blast radius si una dep maliciosa intenta usar el token.
permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout del repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Paso 1: line-up de ISA. Marcado como continue-on-error porque
      # historicamente ISA bloqueo IPs de GitHub Actions; si vuelve a
      # bloquear, queremos que DJVE siga actualizandose.
      - name: Update ISA (line-up portuario)
        id: isa
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python update_today.py --dias 3

      # Paso 2: DJVE del MAGyP. Independiente del paso anterior.
      - name: Update DJVE (MAGyP)
        id: djve
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python update_djve.py

      # Si ISA fallo, marcamos el job como warning (no failure) imprimiendo
      # un mensaje claro. Asi el usuario sabe que ISA bloqueo pero DJVE OK.
      - name: Reportar resultado
        if: always()
        run: |
          echo "ISA outcome: ${{ steps.isa.outcome }}"
          echo "DJVE outcome: ${{ steps.djve.outcome }}"
          if [ "${{ steps.isa.outcome }}" != "success" ]; then
            echo "::warning::ISA fallo. Probable bloqueo de IPs de GitHub Actions. Considerar plan B (Supabase Edge Function)."
          fi

      - name: Subir logs como artifact (opcional, para debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7
          if-no-files-found: ignore
