name: Daily line-up update

# Trigger manual solamente.
# (El cron se removio porque los runners de GitHub Actions no pueden alcanzar
# www.isa-agents.com.ar -- el server responde timeout a esas IPs. El update
# diario corre via Programador de Tareas de Windows en la PC del usuario.)
# Se puede disparar manualmente desde la pestana "Actions" del repo si se
# configura un proxy o se corre desde una IP argentina.
on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout del repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Correr update_today.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python update_today.py --dias 3

      - name: Subir logs como artifact (opcional, para debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs-${{ github.run_id }}
          path: logs/scraper.log
          retention-days: 7
          if-no-files-found: ignore
